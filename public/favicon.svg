<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- background rounded square -->
  <rect x="0" y="0" width="96" height="96" rx="16" fill="white"/>

  <!-- polaroid frame -->
  <rect x="16" y="12" width="64" height="72" rx="6" fill="#fff5f8" stroke="#ffd6e8" stroke-width="1.5"/>

  <!-- photo area -->
  <rect x="22" y="18" width="52" height="48" rx="3" fill="#fde8f0"/>
  <!-- left blush overlay -->
  <rect x="22" y="18" width="26" height="48" rx="3" fill="#ffc6dd" opacity="0.6"/>

  <!-- camera lens ring -->
  <circle cx="48" cy="42" r="12" fill="white" stroke="#c94075" stroke-width="2"/>
  <!-- lens inner fill -->
  <circle cx="48" cy="42" r="8" fill="#f8e0ea"/>
  <!-- lens center -->
  <circle cx="48" cy="42" r="5" fill="#c94075"/>
  <!-- lens highlight -->
  <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.8"/>

  <!-- polaroid bottom white strip -->
  <rect x="22" y="70" width="52" height="10" rx="1" fill="white"/>

  <!-- sparkle purple top-left -->
  <circle cx="28" cy="24" r="2" fill="#a855f7"/>

  <!-- sparkle pink top-right -->
  <circle cx="68" cy="22" r="1.5" fill="#ec4899"/>

  <!-- sparkle blue bottom-right -->
  <circle cx="70" cy="62" r="2" fill="#3b82f6"/>
</svg>